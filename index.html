<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กรมกิจการเด็กและเยาวชน - ลงทะเบียน</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            color: #333;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 16px;
        }
        .form-container {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 720px;
            padding: 40px;
        }
        .form-header {
            text-align: center;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 2px solid #e8e8e8;
        }
        .form-header h1 {
            font-size: 1.5rem;
            color: #1a3a5c;
            margin-bottom: 6px;
        }
        .form-header p {
            font-size: 0.9rem;
            color: #888;
        }
        .section-title {
            font-size: 1rem;
            font-weight: 600;
            color: #1a3a5c;
            margin: 28px 0 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e8e8e8;
        }
        .form-row {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
        }
        .form-group {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .form-group.full {
            width: 100%;
            margin-bottom: 20px;
        }
        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
        }
        label .required {
            color: #e74c3c;
            margin-left: 2px;
        }
        input[type="text"],
        input[type="email"],
        select,
        textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #d0d5dd;
            border-radius: 8px;
            font-size: 0.95rem;
            color: #333;
            background: #fafafa;
            transition: border-color 0.2s, box-shadow 0.2s;
            font-family: inherit;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
            background: #fff;
        }
        textarea {
            resize: vertical;
            min-height: 90px;
        }
        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin: 24px 0 28px;
            padding: 16px;
            background: #f8f9fb;
            border-radius: 8px;
            border: 1px solid #e8e8e8;
        }
        .radio-group {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 10px 0;
        }
        .radio-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 400;
            cursor: pointer;
        }
        .radio-group input[type="radio"] {
            accent-color: #3b82f6;
            cursor: pointer;
        }
        .hint {
            color: #e74c3c;
            font-size: 0.85rem;
            margin-left: 8px;
        }
        .age-display {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: #555;
            padding: 6px 0;
        }
        .age-display input {
            width: 60px;
            text-align: center;
        }
        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-top: 2px;
            accent-color: #3b82f6;
            cursor: pointer;
            flex-shrink: 0;
        }
        .checkbox-group label {
            font-weight: 400;
            color: #555;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .btn-submit {
            display: block;
            width: 100%;
            padding: 14px;
            background: #1a3a5c;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-submit:hover { background: #15304d; }
        .btn-submit:active { transform: scale(0.995); }

        @media (max-width: 600px) {
            .form-row { flex-direction: column; gap: 20px; }
            .form-container { padding: 24px; }
        }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="form-header">
            <h1>กรมกิจการเด็กและเยาวชน</h1>
            <p>แบบฟอร์มลงทะเบียน / Registration Form</p>
        </div>

        <form action="http://dcywah.dcy.go.th/opp/app/register.php" method="POST">

            <!-- ID Card -->
            <div class="form-group full">
                <label for="idcard">เลขบัตรประชาชน (CARD ID) <span class="required">*</span></label>
                <input type="text" id="idcard" name="idcard" maxlength="13" placeholder="กรอกเลขบัตรประชาชน 13 หลัก" required>
            </div>

            <!-- Thai Name Section -->
            <div class="section-title">ข้อมูลภาษาไทย</div>

            <div class="form-row">
                <div class="form-group" style="flex: 0.6;">
                    <label for="PREFIX_TH">คำนำหน้า <span class="required">*</span></label>
                    <select id="PREFIX_TH" name="PREFIX_TH" required>
                        <option value="">-- เลือก --</option>
                        <option value="นาย">นาย</option>
                        <option value="นาง">นาง</option>
                        <option value="นางสาว">นางสาว</option>
                        <option value="เด็กชาย">เด็กชาย</option>
                        <option value="เด็กหญิง">เด็กหญิง</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="NAME_TH">ชื่อ (ภาษาไทย) <span class="required">*</span></label>
                    <input type="text" id="NAME_TH" name="NAME_TH" placeholder="ชื่อ" required>
                </div>
                <div class="form-group">
                    <label for="LASTNAME_TH">นามสกุล (ภาษาไทย) <span class="required">*</span></label>
                    <input type="text" id="LASTNAME_TH" name="LASTNAME_TH" placeholder="นามสกุล" required>
                </div>
            </div>

            <!-- English Name Section -->
            <div class="section-title">English Information</div>

            <div class="form-row">
                <div class="form-group" style="flex: 0.6;">
                    <label for="PREFIX_EN">Prefix <span class="required">*</span></label>
                    <select id="PREFIX_EN" name="PREFIX_EN" required>
                        <option value="">-- Select --</option>
                        <option value="MR">MR</option>
                        <option value="MRS">MRS</option>
                        <option value="MS">MS</option>
                        <option value="MASTER">MASTER</option>
                        <option value="MISS">MISS</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="test_txt1">First Name (EN) <span class="required">*</span></label>
                    <input type="text" id="test_txt1" name="NAME_EN" placeholder="First name" required>
                </div>
                <div class="form-group">
                    <label for="test_txt2">Last Name (EN) <span class="required">*</span></label>
                    <input type="text" id="test_txt2" name="LASTNAME_EN" placeholder="Last name" required>
                </div>
            </div>

            <!-- Personal Details Section -->
            <div class="section-title">ข้อมูลส่วนบุคคล</div>

            <!-- เพศ (Gender) -->
            <div class="form-row">
                <div class="form-group" style="flex: 0.4;">
                    <label>เพศ :</label>
                </div>
                <div class="form-group">
                    <div class="radio-group">
                        <label><input type="radio" name="GENDER" value="ชาย" checked> ชาย</label>
                        <label><input type="radio" name="GENDER" value="หญิง"> หญิง</label>
                    </div>
                </div>
            </div>

            <!-- เชื้อชาติ (Ethnicity) -->
            <div class="form-row">
                <div class="form-group" style="flex: 0.4;">
                    <label for="ETHNICITY">เชื้อชาติ :</label>
                </div>
                <div class="form-group">
                    <select id="ETHNICITY" name="ETHNICITY">
                        <option value="ไทย">ไทย</option>
                        <option value="จีน">จีน</option>
                        <option value="อื่นๆ">อื่นๆ</option>
                    </select>
                </div>
            </div>

            <!-- สัญชาติ (Nationality) -->
            <div class="form-row">
                <div class="form-group" style="flex: 0.4;">
                    <label for="NATIONALITY">สัญชาติ : <span class="required">*</span></label>
                </div>
                <div class="form-group">
                    <select id="NATIONALITY" name="NATIONALITY" required>
                        <option value="ไทย">ไทย</option>
                        <option value="อื่นๆ">อื่นๆ</option>
                    </select>
                </div>
            </div>

            <!-- ศาสนา (Religion) -->
            <div class="form-row">
                <div class="form-group" style="flex: 0.4;">
                    <label for="RELIGION">ศาสนา :</label>
                </div>
                <div class="form-group">
                    <select id="RELIGION" name="RELIGION">
                        <option value="">-- เลือก --</option>
                        <option value="พุทธ">พุทธ</option>
                        <option value="คริสต์">คริสต์</option>
                        <option value="อิสลาม">อิสลาม</option>
                        <option value="ฮินดู">ฮินดู</option>
                        <option value="อื่นๆ">อื่นๆ</option>
                    </select>
                </div>
            </div>

            <!-- วันเดือนปี เกิด (Date of Birth) -->
            <div class="form-row">
                <div class="form-group" style="flex: 0.4;">
                    <label for="BIRTHDAY">วันเดือนปี เกิด : <span class="required">*</span></label>
                </div>
                <div class="form-group">
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <input type="text" id="BIRTHDAY" name="BIRTHDAY" maxlength="8" placeholder="ววดดปปปป" required style="width: 160px;">
                        <span class="hint">* (ระบุเป็น ววดดปปปป เช่น 01012552)</span>
                    </div>
                </div>
            </div>

            <!-- อายุ (Age) -->
            <div class="form-row">
                <div class="form-group" style="flex: 0.4;">
                    <label>อายุ :</label>
                </div>
                <div class="form-group">
                    <div class="age-display">
                        <input type="text" id="AGE_YEAR" name="AGE_YEAR" readonly>
                        <span>ปี</span>
                        <input type="text" id="AGE_MONTH" name="AGE_MONTH" readonly>
                        <span>เดือน</span>
                    </div>
                </div>
            </div>

            <!-- สถานภาพสมรส (Marital Status) -->
            <div class="form-row">
                <div class="form-group" style="flex: 0.4;">
                    <label>สถานภาพสมรส :</label>
                </div>
                <div class="form-group">
                    <div class="radio-group">
                        <label><input type="radio" name="MARITAL" value="โสด" checked> โสด</label>
                        <label><input type="radio" name="MARITAL" value="สมรส"> สมรส</label>
                        <label><input type="radio" name="MARITAL" value="หม้าย"> หม้าย</label>
                    </div>
                </div>
            </div>

            <!-- Contact Section -->
            <div class="section-title">ข้อมูลติดต่อ / Contact</div>

            <div class="form-group full">
                <label for="EMAIL">อีเมล (Email) <span class="required">*</span></label>
                <input type="email" id="EMAIL" name="EMAIL" placeholder="example@email.com" required>
            </div>

            <div class="form-group full">
                <label for="ADDRESS">ที่อยู่ (Address) <span class="required">*</span></label>
                <textarea id="ADDRESS" name="ADDRESS" placeholder="กรอกที่อยู่" required></textarea>
            </div>

            <!-- Education Section -->
            <div class="section-title">การศึกษาขั้นสูงสุด</div>

            <div class="form-row">
                <div class="form-group" style="flex: 0.3;">
                    <label for="EDU_LEVEL">วุฒิ :</label>
                </div>
                <div class="form-group">
                    <select id="EDU_LEVEL" name="EDU_LEVEL">
                        <option value="">-- เลือก --</option>
                        <option value="ปริญญาตรีหรือเทียบเท่า">ปริญญาตรีหรือเทียบเท่า</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group" style="flex: 0.3;">
                    <label for="EDU_INSTITUTE">สถาบัน :</label>
                </div>
                <div class="form-group">
                    <input type="text" id="EDU_INSTITUTE" name="EDU_INSTITUTE">
                </div>
            </div>

            <!-- Emergency Contact Section -->
            <div class="section-title" style="background: #d4edda; padding: 10px 12px; border-radius: 6px; border: none;">
                บุคคลที่ทาง สห. สามารถติดต่อได้กรณีฉุกเฉิน คือ
            </div>

            <!-- คำนำหน้าชื่อ (Prefix) -->
            <div class="form-row" style="align-items: center;">
                <div class="form-group" style="flex: 0.4;">
                    <label>คำนำหน้าชื่อ :</label>
                </div>
                <div class="form-group">
                    <div class="radio-group">
                        <label><input type="radio" name="EC_PREFIX" value="นาย"> นาย</label>
                        <label><input type="radio" name="EC_PREFIX" value="นาง"> นาง</label>
                        <label><input type="radio" name="EC_PREFIX" value="นางสาว"> นางสาว</label>
                        <label><input type="radio" name="EC_PREFIX" value="อื่นๆ"> อื่น ๆ</label>
                        <input type="text" name="EC_PREFIX_OTHER" placeholder="" style="width: 120px;">
                    </div>
                </div>
            </div>

            <!-- ชื่อ / นามสกุล -->
            <div class="form-row">
                <div class="form-group">
                    <label for="EC_NAME">ชื่อ :</label>
                    <input type="text" id="EC_NAME" name="EC_NAME">
                </div>
                <div class="form-group">
                    <label for="EC_LASTNAME">นามสกุล :</label>
                    <input type="text" id="EC_LASTNAME" name="EC_LASTNAME">
                </div>
            </div>

            <!-- ความสัมพันธ์ (Relationship) -->
            <div class="form-row">
                <div class="form-group">
                    <label for="EC_RELATION">ความสัมพันธ์ :</label>
                    <select id="EC_RELATION" name="EC_RELATION">
                        <option value="">-- เลือก --</option>
                        <option value="บิดา">บิดา</option>
                        <option value="มารดา">มารดา</option>
                        <option value="พี่น้อง">พี่น้อง</option>
                        <option value="คู่สมรส">คู่สมรส</option>
                        <option value="ญาติ">ญาติ</option>
                        <option value="เพื่อน">เพื่อน</option>
                        <option value="อื่นๆ">อื่นๆ</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="EC_RELATION_DETAIL">รายละเอียด :</label>
                    <input type="text" id="EC_RELATION_DETAIL" name="EC_RELATION_DETAIL">
                </div>
            </div>

            <!-- โทรศัพท์มือถือ (Mobile) -->
            <div class="form-group full">
                <label for="EC_PHONE">โทรศัพท์มือถือ :</label>
                <input type="text" id="EC_PHONE" name="EC_PHONE" maxlength="10">
            </div>

            <!-- E-mail -->
            <div class="form-group full">
                <label for="EC_EMAIL">E-mail :</label>
                <input type="text" id="EC_EMAIL" name="EC_EMAIL">
            </div>

            <!-- Accept -->
            <div class="checkbox-group">
                <input type="checkbox" id="ckAccept" name="ckAccept" value="true" required>
                <label for="ckAccept">ข้าพเจ้ายินยอมให้ใช้ข้อมูลส่วนบุคคลเพื่อการลงทะเบียน / I agree to the terms and conditions</label>
            </div>

            <button type="submit" class="btn-submit">ลงทะเบียน / Register</button>
        </form>
    </div>
    <script>
        document.getElementById('BIRTHDAY').addEventListener('input', function() {
            const val = this.value;
            if (val.length === 8) {
                const day = parseInt(val.substring(0, 2));
                const month = parseInt(val.substring(2, 4));
                const yearBE = parseInt(val.substring(4, 8));
                const yearCE = yearBE - 543;
                const birth = new Date(yearCE, month - 1, day);
                const today = new Date();
                let years = today.getFullYear() - birth.getFullYear();
                let months = today.getMonth() - birth.getMonth();
                if (today.getDate() < birth.getDate()) months--;
                if (months < 0) { years--; months += 12; }
                document.getElementById('AGE_YEAR').value = years;
                document.getElementById('AGE_MONTH').value = months;
            } else {
                document.getElementById('AGE_YEAR').value = '';
                document.getElementById('AGE_MONTH').value = '';
            }
        });
    </script>
</body>
</html>
